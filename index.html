<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>인천 부평2동 영업페이지 v2</title>
<style>
  :root {
    --bg:#f5f7fb;
    --card:#ffffff;
    --text:#111827;
    --muted:#6b7280;
    --naver:#03c75a;
    --kakao:#fee500;
    --drive:#2563eb;
    --call:#16a34a;
    --copy:#6b7280;
    --done:#e5e7eb;
    --border:#e5e7eb;
  }
  * { box-sizing:border-box; }
  body {
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",Arial,sans-serif;
    background:var(--bg);
    color:var(--text);
    font-size:18px;
    line-height:1.45;
  }
  header {
    position:sticky;
    top:0;
    z-index:10;
    padding:16px 14px 12px;
    background:linear-gradient(135deg,#0f766e,#1d4ed8);
    color:white;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
  }
  h1 {
    margin:0 0 6px;
    font-size:23px;
    font-weight:800;
  }
  .sub {
    font-size:14px;
    opacity:.95;
  }
  .progress-wrap {
    margin-top:10px;
    background:rgba(255,255,255,.25);
    border-radius:999px;
    overflow:hidden;
    height:12px;
  }
  .progress-bar {
    width:0%;
    height:100%;
    background:#fff;
    border-radius:999px;
    transition:width .2s ease;
  }
  .toolbar {
    display:flex;
    gap:8px;
    padding:10px 12px;
    background:#fff;
    border-bottom:1px solid var(--border);
    position:sticky;
    top:84px;
    z-index:9;
  }
  .toolbar button {
    flex:1;
    border:0;
    border-radius:10px;
    padding:11px 8px;
    font-weight:800;
    font-size:15px;
    background:#111827;
    color:#fff;
  }
  main {
    padding:12px;
    max-width:720px;
    margin:0 auto 40px;
  }
  .store {
    background:var(--card);
    border:1px solid var(--border);
    border-radius:18px;
    padding:16px;
    margin:12px 0;
    box-shadow:0 2px 8px rgba(15,23,42,.06);
  }
  .store.done {
    background:#f1f5f9;
    opacity:.72;
  }
  .topline {
    display:flex;
    align-items:flex-start;
    gap:12px;
    margin-bottom:10px;
  }
  .num {
    min-width:50px;
    height:50px;
    border-radius:14px;
    background:#111827;
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:24px;
    font-weight:900;
  }
  .store.done .num {
    background:#64748b;
  }
  .name {
    font-size:24px;
    font-weight:900;
    word-break:keep-all;
    line-height:1.2;
    margin-bottom:4px;
  }
  .addr {
    font-size:17px;
    color:#374151;
    word-break:keep-all;
    margin:10px 0 12px;
  }
  .phone {
    color:#4b5563;
    font-size:16px;
    margin-top:4px;
  }
  .done-row {
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px 0 12px;
    font-size:18px;
    font-weight:800;
  }
  input[type="checkbox"] {
    width:28px;
    height:28px;
  }
  .btns {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
  }
  .btn {
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:56px;
    border-radius:14px;
    text-decoration:none;
    font-size:18px;
    font-weight:900;
    border:0;
    padding:12px 10px;
    color:#111827;
    width:100%;
  }
  .naver { background:var(--naver); color:white; }
  .kakao { background:var(--kakao); color:#111827; }
  .drive { background:var(--drive); color:white; }
  .call { background:var(--call); color:white; }
  .copy { background:var(--copy); color:white; }
  .full { grid-column:1 / -1; }
  .small-note {
    font-size:13px;
    color:#6b7280;
    margin-top:8px;
  }
  .toast {
    position:fixed;
    left:50%;
    bottom:24px;
    transform:translateX(-50%);
    background:#111827;
    color:white;
    padding:12px 18px;
    border-radius:999px;
    opacity:0;
    pointer-events:none;
    transition:opacity .2s ease;
    z-index:99;
    font-weight:800;
  }
  .toast.show { opacity:1; }
  @media (max-width:380px) {
    body { font-size:16px; }
    .name { font-size:21px; }
    .btn { font-size:16px; min-height:52px; }
    .num { min-width:46px; height:46px; font-size:22px; }
  }
</style>
</head>

const STORAGE_KEY = "sales-route-v2-" + location.pathname + "-인천부평2동";

function escapeHtml(s) {
  return String(s || "").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function getDoneMap() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); }
  catch(e) { return {}; }
}

function saveDoneMap(map) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(map));
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg || "복사됨";
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 1300);
}

function copyText(text) {
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(() => showToast("주소 복사됨"));
  } else {
    const ta = document.createElement("textarea");
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
    showToast("주소 복사됨");
  }
}

function render() {
  const done = getDoneMap();
  const list = document.getElementById("list");
  list.innerHTML = STORES.map(s => {
    const checked = !!done[s.order];
    const phoneBtn = s.phone ? `<a class="btn call" href="tel:${escapeHtml(s.phone)}">전화</a>` : "";
    return `
      <section class="store ${checked ? "done" : ""}" id="store-${s.order}">
        <div class="topline">
          <div class="num">${s.order}</div>
          <div>
            <div class="name">${escapeHtml(s.name)}</div>
            <div class="phone">${s.phone ? "☎ " + escapeHtml(s.phone) : "전화번호 없음"}</div>
          </div>
        </div>
        <div class="addr">${escapeHtml(s.address)}</div>
        <label class="done-row">
          <input type="checkbox" ${checked ? "checked" : ""} onchange="toggleDone(${s.order}, this.checked)">
          방문완료
        </label>
        <div class="btns">
          <a class="btn naver" target="_blank" rel="noopener" href="${s.naver}">네이버지도</a>
          <a class="btn kakao" target="_blank" rel="noopener" href="${s.kakao}">카카오맵</a>
          <a class="btn drive full" target="_blank" rel="noopener" href="${s.kakaoNavi}">카카오네비/운전안내</a>
          ${phoneBtn}
          <button class="btn copy" onclick="copyText('${String(s.address).replace(/'/g, "\\'")}')">주소복사</button>
        </div>
        <div class="small-note">카카오네비 버튼은 카카오맵 검색/운전안내 진입용입니다.</div>
      </section>
    `;
  }).join("");
  updateProgress();
}

function toggleDone(order, val) {
  const done = getDoneMap();
  if (val) done[order] = true; else delete done[order];
  saveDoneMap(done);
  const card = document.getElementById("store-" + order);
  if (card) card.classList.toggle("done", val);
  updateProgress();
}

function updateProgress() {
  const done = getDoneMap();
  const count = Object.keys(done).length;
  const total = STORES.length;
  document.getElementById("doneCount").textContent = count;
  document.getElementById("remainCount").textContent = Math.max(0, total - count);
  document.getElementById("progressBar").style.width = total ? (count / total * 100) + "%" : "0%";
}

function scrollToNext() {
  const done = getDoneMap();
  const next = STORES.find(s => !done[s.order]);
  if (next) {
    document.getElementById("store-" + next.order).scrollIntoView({behavior:"smooth", block:"start"});
  } else {
    showToast("모두 방문완료");
  }
}

function resetChecks() {
  if (confirm("방문완료 체크를 모두 지울까요?")) {
    localStorage.removeItem(STORAGE_KEY);
    render();
  }
}

render();
</script>
